<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK FREE RDP TRIAL</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: 'Arial', sans-serif;
  overflow-x: hidden;
}

/* Animated Background */
body {
  background: linear-gradient(-45deg, #1e3c72, #2a5298, #00eaff, #0077b6);
  background-size: 400% 400%;
  animation: gradientBG 15s ease infinite;
  color: white;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
header {
  text-align: center;
  font-size: 2.2em;
  font-weight: bold;
  padding: 20px 0;
  background: rgba(0,0,0,0.5);
  color: white;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  animation: textGradient 5s ease infinite;
}

/* Container */
main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  text-align: center;
  background: rgba(0,0,0,0.6);
  padding: 50px 30px;
  border-radius: 25px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.5);
  max-width: 400px;
  width: 90%;
  animation: fadeInUp 1s ease;
}

h2 {
  font-size: 1.6em;
  margin-bottom: 20px;
}

p {
  font-size: 0.95em;
  color: #cce7ff;
  margin-top: 10px;
}

/* Timer (hidden initially) */
.timer {
  font-size: 1.2em;
  margin-top: 15px;
  font-weight: bold;
  color: #00eaff;
  display: none;
}

/* CTA Button */
.button {
  background: linear-gradient(90deg, #00eaff, #0077b6);
  color: #fff;
  padding: 15px 45px;
  font-size: 1.2em;
  font-weight: bold;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  margin-top: 20px;
  position: relative;
  overflow: hidden;
  transition: all 0.4s ease;
}

.button::after {
  content: '';
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.2);
  transform: skewX(-25deg);
  transition: all 0.5s ease;
}

.button:hover::after {
  left: 125%;
}

.button:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

/* WhatsApp Floating Button */
.whatsapp {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background-color: #25d366;
  color: white;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  text-align: center;
  font-size: 30px;
  line-height: 60px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  transition: transform 0.3s ease;
  text-decoration: none;
  animation: pulse 2s infinite;
}

.whatsapp:hover {
  transform: scale(1.1);
}

/* Footer */
footer {
  background: rgba(0,0,0,0.7);
  padding: 15px 0;
  text-align: center;
  font-size: 0.9em;
  letter-spacing: 0.5px;
  box-shadow: 0 -4px 10px rgba(0,0,0,0.3);
}

/* Animations */
@keyframes gradientBG {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

@keyframes textGradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

@keyframes pulse {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(37,211,102,0.5);}
  50% { transform: scale(1.1); box-shadow: 0 0 20px rgba(37,211,102,0.7);}
  100% { transform: scale(1); box-shadow: 0 0 0 rgba(37,211,102,0.5);}
}

@keyframes fadeInUp {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<header>SK FREE RDP TRIAL</header>

<main>
  <div class="container">
    <h2>Get Your Free RDP Access</h2>
    <button id="startBtn" class="button">Get Free Trial by SK</button>
    <p>Click the button to start your free trial!</p>
    <div class="timer">Redirecting in <span id="count">10</span> seconds...</div>
  </div>
</main>

<a href="https://wa.me/923181443860" class="whatsapp" target="_blank" title="Chat with us">📱</a>

<footer>© 2026 SK Tech. All Rights Reserved.</footer>

<script>
const btn = document.getElementById('startBtn');
const timerEl = document.querySelector('.timer');
const countEl = document.getElementById('count');

btn.addEventListener('click', () => {
  btn.disabled = true; // prevent multiple clicks
  timerEl.style.display = 'block';
  let count = 8;
  countEl.textContent = count;
  const interval = setInterval(() => {
    count--;
    countEl.textContent = count;
    if(count <= 0){
      clearInterval(interval);
      window.location.href = "https://app.apponfly.com/trial"; // replace with your link
    }
  }, 1000);
});
</script>

</body>
</html>
